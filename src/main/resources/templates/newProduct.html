<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{template1 :: layout(~{::section})}">
<body>
<section>
    <div class="card shadow-sm">
        <div class="card-header"><h4 class="mb-0">New Product</h4></div>
        <div class="card-body">
            <form method="post" th:action="@{/saveProduct}" th:object="${product}">
                <div class="mb-3">
                    <label class="form-label">Name</label>
                    <input type="text" class="form-control" th:field="*{name}"
                           th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'">
                    <span class="invalid-feedback" th:if="${#fields.hasErrors('name')}"
                          th:errors="*{name}"></span>
                </div>
                <div class="mb-3">
                    <label class="form-label">Price</label>
                    <input type="number" step="0.01" class="form-control" th:field="*{price}"
                           th:classappend="${#fields.hasErrors('price')} ? 'is-invalid'">
                    <span class="invalid-feedback" th:if="${#fields.hasErrors('price')}"
                          th:errors="*{price}"></span>
                </div>
                <div class="mb-3">
                    <label class="form-label">Quantity</label>
                    <input type="number" step="1" class="form-control" th:field="*{quantity}"
                           th:classappend="${#fields.hasErrors('quantity')} ? 'is-invalid'">
                    <span class="invalid-feedback" th:if="${#fields.hasErrors('quantity')}"
                          th:errors="*{quantity}"></span>
                </div>
                <button type="submit" class="btn btn-success"><i class="bi bi-save"></i> Save</button>
                <a class="btn btn-secondary" th:href="@{/products}">Cancel</a>
            </form>
        </div>
    </div>
</section>
</body>
</html>
