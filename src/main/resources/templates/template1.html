<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="layout(content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/products}"><i class="bi bi-box-seam"></i> Products</a>
        <div class="navbar-nav me-auto">
            <a class="nav-link" th:href="@{/products}">List</a>
            <a class="nav-link" sec:authorize="hasRole('ADMIN')" th:href="@{/newProduct}">New Product</a>
        </div>
        <div class="navbar-nav">
            <span class="nav-link text-light"><i class="bi bi-person-circle"></i>
                <span sec:authentication="name">user</span>
                (<span sec:authentication="principal.authorities">roles</span>)</span>
            <form method="post" th:action="@{/logout}" class="d-flex">
                <button class="btn btn-outline-light btn-sm">Logout</button>
            </form>
        </div>
    </div>
</nav>
<div class="container mt-4">
    <div th:replace="${content}">Page content</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
